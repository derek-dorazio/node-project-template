# CI/CD Pipeline Template
#
# Naming convention: scope-testtype-target
#   Service:    service-build, service-unit-tests, service-integration-tests,
#               service-functional-api-tests, service-coverage-report
#   App:        <projectName>-build, <projectName>-unit-tests
#   Repo-wide:  lint, typecheck, openapi-contract-check
#
# Pipeline stages:
#   1. lint + typecheck + openapi-contract-check
#   2. service-unit-tests (with Postgres service container)
#   3. service-integration-tests
#   4. service-functional-api-tests
#   5. service-coverage-report
#   6. <projectName>-unit-tests
#   7. service-build + <projectName>-build
#   8. (Deploy stages — add when ready)
#   9. Post-deploy smoke tests
#   10. Post-deploy browser E2E

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx prisma generate --schema=packages/core-api/prisma/schema.prisma
      - run: npm run lint

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx prisma generate --schema=packages/core-api/prisma/schema.prisma
      - run: npm run typecheck

  openapi-contract-check:
    needs: [lint, typecheck]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx prisma generate --schema=packages/core-api/prisma/schema.prisma
      - run: npm run openapi-contract-check

  service-unit-tests:
    needs: [lint, typecheck]
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: testdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://testuser:testpass@localhost:5432/testdb
      JWT_SECRET: test-secret-change-in-production
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx prisma generate --schema=packages/core-api/prisma/schema.prisma
      - run: npx prisma migrate deploy --schema=packages/core-api/prisma/schema.prisma
      - name: Service unit tests
        run: npm run test:coverage:service:unit

  service-integration-tests:
    needs: [lint, typecheck]
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: testdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://testuser:testpass@localhost:5432/testdb
      JWT_SECRET: test-secret-change-in-production
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx prisma generate --schema=packages/core-api/prisma/schema.prisma
      - run: npx prisma migrate deploy --schema=packages/core-api/prisma/schema.prisma
      - name: Service integration tests
        run: npm run test:coverage:service:integration

  service-functional-api-tests:
    needs: [lint, typecheck]
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: testdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://testuser:testpass@localhost:5432/testdb
      JWT_SECRET: test-secret-change-in-production
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx prisma generate --schema=packages/core-api/prisma/schema.prisma
      - run: npx prisma migrate deploy --schema=packages/core-api/prisma/schema.prisma
      - name: Service functional API tests
        run: npm run test:service:functional-api:coverage

  service-coverage-report:
    needs: [service-unit-tests, service-integration-tests, service-functional-api-tests]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Merge service coverage
        run: npm run test:coverage:service:merged
      - uses: actions/upload-artifact@v4
        with:
          name: service-coverage-report
          path: coverage/
          retention-days: 7

  projectName-unit-tests:
    needs: [lint, typecheck]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx turbo build --filter=@<projectName>/shared
      - name: "<projectName> unit tests"
        run: npm run "test:<projectName>:unit"

  service-build:
    needs: [lint, typecheck]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Build service
        run: npm run build:service

  projectName-build:
    needs: [lint, typecheck]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: "Build <projectName>"
        run: "npm run build:<projectName>"

  # Uncomment and customize when deployment is ready:
  #
  # deploy:
  #   needs: [service-coverage-report, projectName-unit-tests, service-build, projectName-build]
  #   if: github.ref == 'refs/heads/main'
  #   runs-on: ubuntu-latest
